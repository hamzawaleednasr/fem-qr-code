<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code | First FEM Challenge</title>

    <link rel="icon" type="image/x-icon" href="images/favicon-32x32.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <article class="qr-card">
        <figure class="qr-figure">
            <img 
                class="qr-code" 
                src="images/image-qr-code.png" 
                alt="qr code image"
            >
        </figure>
        <section class="qr-content">
            <h1 class="title">Imporve your front-end skills by building projects</h2>
            <p class="desc">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
        </section>
    </article>
</body>
</html>
